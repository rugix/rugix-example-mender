name: Bake Images

on:
  workflow_dispatch:
  push:

env:
  NAME: "Mender Template"

jobs:
  bake-image:
    name: Bake Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        job:
          - { system: rpi-raspios }
          - { system: rpi-raspios-pi4 }
          - { system: rpi-debian }
          - { system: rpi-debian-pi4 }
          - { system: efi-debian-amd64 }
          - { system: efi-debian-arm64 }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install QEMU
        run: docker run --privileged --rm tonistiigi/binfmt --install arm64

      - name: Prepare and Configure
        env:
          SECRET_ENV: ${{ secrets.ENV || '' }}
        run: |
          mkdir build
          if [ -n "${SECRET_ENV}" ]; then
            echo "${SECRET_ENV}" > .env
          fi

      - name: Bake Image
        run: ./run-bakery bake image ${{ matrix.job.system }}

      - name: Bake Bundle
        run: ./run-bakery bake bundle --disable-compression ${{ matrix.job.system }}

      - name: Build Mender Artifact
        run: |
          VERSION=$(date +'%Y%m%d.%H%M')
          podman run --rm \
              -v "$(pwd)/build":/build \
              docker.io/library/debian:bullseye-slim \
              bash -c "
                  apt-get update -qq && apt-get install -y -qq wget >/dev/null 2>&1
                  wget -q -O /usr/local/bin/mender-artifact \
                      https://downloads.mender.io/mender-artifact/4.0.0/linux/mender-artifact
                  chmod +x /usr/local/bin/mender-artifact
                  mender-artifact write module-image \
                      -n '${NAME} ${VERSION}' \
                      -t raspberrypi4 \
                      -T rugix-bundle \
                      -f /build/${{ matrix.job.system }}/system.rugixb \
                      -o /build/${VERSION}.mender \
                      --software-name '${NAME}' \
                      --software-version '${VERSION}'
              "

      # - name: Upload Build Artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ matrix.job.system }}
      #     path: build/*
